<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">SB favicon</title>
  <desc id="desc">Minimalist favicon with initials SB, cream background, teal rounded border, subtle vertical stripes, and teal underline.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4f0e9"></stop>
      <stop offset="100%" stop-color="#f1ede6"></stop>
    </linearGradient>

    <pattern id="stripes" width="50.8" height="512" patternUnits="userSpaceOnUse">
      <rect width="51" height="512" fill="none"></rect>
      <rect x="0" y="0" width="4" height="512" fill="#d9d1c6" opacity="0.28"></rect>
    </pattern>

    <style>
      .initials {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-weight: 800;
        font-size: 350px;
        letter-spacing: px;
        fill: #111111;
      }
    </style>
  </defs>

  <rect x="8" y="8" width="496" height="496" rx="28" fill="url(#bg)" stroke="#0f8a85" stroke-width="6"></rect>
  <rect x="20" y="20" width="472" height="472" rx="22" fill="url(#stripes)" opacity="0.55"></rect>

  <text x="256" y="340" text-anchor="middle" class="initials">SB</text>
  <line x1="144" y1="400" x2="366" y2="400" stroke="#0f8a85" stroke-width="8" stroke-linecap="round"></line>
</svg>